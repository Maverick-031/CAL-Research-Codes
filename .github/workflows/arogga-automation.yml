name: Arogga Daily Scraper

on:
  schedule:
    - cron: '0 18 * * *'      # Runs daily at 12:00 AM Bangladesh Time (6:00 PM UTC)
  workflow_dispatch:         # Allows manual triggers

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write        

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Arogga/requirements.txt

      - name: Run Arogga scraper
        run: |
          cd Arogga
          python arogga_scraper.py
        env:
          # Uses the pre-installed Chrome on the runner
          CHROME_BIN: /usr/bin/google-chrome

      - name: Commit and push the new CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Using a wildcard to catch all files in the output directory
          git add Arogga/output/arogga_*.csv
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update arogga data $(date +'%Y-%m-%d')"
            git push
          fi
