name: Automated Chaldal Scraper

on:
  schedule:
    # This runs at 02:00 UTC (Which is 08:00 AM Bangladesh Time)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'latest'
          install-chromedriver: true

      - name: Run Scraper
        # We point to links.xlsx. Ensure the filename matches exactly.
        run: python Chaldal_scrape.py --input links.xlsx

      - name: Upload Data to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Chaldal-Scraped-Data-${{ github.run_id }}
          path: chaldal_products_*.csv
          retention-days: 30
