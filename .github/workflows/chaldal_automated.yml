name: Chaldal Daily Scraper

on:
  schedule:
    - cron: '0 3 * * *'      # Runs every day at 3:00 AM UTC
  workflow_dispatch:         # Allows manual triggers

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write        

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Selenium and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Chaldal/requirements.txt

      - name: Run Chaldal scraper
        run: |
          cd Chaldal
          python Chaldal_scrape.py
        env:
          # This helps Selenium find the pre-installed Chrome in the runner
          CHROME_BIN: /usr/bin/google-chrome

      - name: Commit and push the new CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add only the Chaldal directory files
          git add Chaldal/*.csv
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update chaldal data $(date +'%Y-%m-%d')"
            git push
          fi
