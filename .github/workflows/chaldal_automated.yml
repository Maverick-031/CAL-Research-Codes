name: Automated Chaldal Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install selenium pandas openpyxl beautifulsoup4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'latest'
          install-chromedriver: true

      - name: Run Scraper
        working-directory: ./Chaldal
        run: |
          # xvfb-run creates a virtual display which is often required for Chrome on Linux
          xvfb-run python Chaldal_scrape.py --input links.xlsx

      - name: List Files (Debug Step)
        if: always()
        run: ls -R

      - name: Upload Data to GitHub Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Chaldal-Data-${{ github.run_id }}
          # This path looks for the CSV specifically inside the Chaldal subfolder
          path: Chaldal/chaldal_products_*.csv
          if-no-files-found: error
